name: Build Android APK

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install Dependencies
        run: rm package-lock.json && npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Ensure Executable Permission for Gradlew
        run: chmod +x android/gradlew

      - name: Generate Release Keystore
        run: |
          cd android
          keytool -genkey -v -keystore app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass neuroguard2026 -keypass neuroguard2026 -dname "CN=NeuroGuard, OU=App, O=NeuroGuard, L=Barcelona, ST=Catalunya, C=ES"
          echo "storeFile=release.keystore" > keystore.properties
          echo "storePassword=neuroguard2026" >> keystore.properties
          echo "keyAlias=release" >> keystore.properties
          echo "keyPassword=neuroguard2026" >> keystore.properties

      - name: Build Android App Bundle (Release)
        run: cd android && ./gradlew bundleRelease

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: NeuroGuard-App-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
